name: packyapi
version: 1.0.0
description: "PackyAPI image generation backend (OpenAI-compatible gpt-image-2). Saves generated images to $HERMES_HOME/cache/images/."
author: xingqiux
kind: backend
requires_env:
  - PACKYAPI_API_KEY
optional_env:
  - name: PACKYAPI_BASE_URL
    description: "PackyAPI base URL override"
    prompt: "PackyAPI base URL (leave empty for default)"
    password: false
    category: tool

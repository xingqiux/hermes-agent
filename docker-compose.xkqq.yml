services:
  gateway:
    image: ${HERMES_IMAGE:-docker.xkqq.top/xingqiux/hermes-agent:latest}
    container_name: hermes
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${HERMES_DATA_DIR:-/home/ziyu/services/hermes-agent-data}:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-1001}
      - HERMES_GID=${HERMES_GID:-1001}
      - HTTP_PROXY=${HTTP_PROXY:-http://172.19.0.1:17890}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://172.19.0.1:17890}
      - ALL_PROXY=${ALL_PROXY:-http://172.19.0.1:17890}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY:-http://172.19.0.1:17890}
      - NO_PROXY=${NO_PROXY:-127.0.0.1,localhost,::1,172.19.0.1,ilinkai.weixin.qq.com,novac2c.cdn.weixin.qq.com}
    extra_hosts:
      - "ilinkai.weixin.qq.com:180.101.242.203"
    command: ["gateway", "run"]

  dashboard:
    image: ${HERMES_IMAGE:-docker.xkqq.top/xingqiux/hermes-agent:latest}
    container_name: hermes-dashboard
    restart: unless-stopped
    network_mode: host
    depends_on:
      - gateway
    volumes:
      - ${HERMES_DATA_DIR:-/home/ziyu/services/hermes-agent-data}:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-1001}
      - HERMES_GID=${HERMES_GID:-1001}
      - HTTP_PROXY=${HTTP_PROXY:-http://172.19.0.1:17890}
      - HTTPS_PROXY=${HTTPS_PROXY:-http://172.19.0.1:17890}
      - ALL_PROXY=${ALL_PROXY:-http://172.19.0.1:17890}
      - TELEGRAM_PROXY=${TELEGRAM_PROXY:-http://172.19.0.1:17890}
      - NO_PROXY=${NO_PROXY:-127.0.0.1,localhost,::1,172.19.0.1,ilinkai.weixin.qq.com,novac2c.cdn.weixin.qq.com}
      - HERMES_SKIP_PROFILE_RECONCILE=1
    extra_hosts:
      - "ilinkai.weixin.qq.com:180.101.242.203"
    command: ["dashboard", "--host", "127.0.0.1", "--no-open"]
